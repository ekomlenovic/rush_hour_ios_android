name: Build iOS & Android (Unsigned)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Apps
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Bump version from package.json
        id: bump-version
        run: |
          npm version patch --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
          # Sync to app.json
          node -e "
            const fs = require('fs');
            const app = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            app.expo.version = '${VERSION}';
            fs.writeFileSync('app.json', JSON.stringify(app, null, 2));
          "

      - name: Install Expo CLI + EAS CLI
        run: npm install -g expo-cli eas-cli

      # iOS Build
      - name: Generate native iOS project (expo prebuild)
        run: npx expo prebuild --platform ios --clean
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Install CocoaPods
        working-directory: ios
        run: pod install

      - name: Build iOS unsigned archive (xcodebuild)
        working-directory: ios
        run: |
          xcodebuild archive \
            -workspace RushHours.xcworkspace \
            -scheme RushHours \
            -configuration Release \
            -archivePath ../build/RushHours.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            -allowProvisioningUpdates \
            | xcpretty --color || true

      - name: Package unsigned IPA
        run: |
          mkdir -p build/ipa/Payload
          cp -r build/RushHours.xcarchive/Products/Applications/RushHours.app build/ipa/Payload/
          cd build/ipa
          zip -r ../../rush-hours-unsigned.ipa Payload

      # Android Build
      - name: Generate native Android project (expo prebuild)
        run: npx expo prebuild --platform android --clean
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Copy Android APK
        run: cp android/app/build/outputs/apk/release/app-release.apk rush-hours.apk

      # Artifacts and Release
      - name: Upload Binaries as GitHub artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rush-hours-builds
          path: |
            rush-hours-unsigned.ipa
            rush-hours.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: v${{ steps.bump-version.outputs.version }}-b${{ github.run_number }}
          name: Rush Hours v${{ steps.bump-version.outputs.version }} (Build ${{ github.run_number }})
          body: |
            ## Release v${{ steps.bump-version.outputs.version }}
            
            Multi-platform build from `${{ github.sha }}`.

            ### iOS (IPA Non-Signé)
            À installer via SideStore / AltStore.
            
            ### Android (APK)
            Installation directe.
          files: |
            rush-hours-unsigned.ipa
            rush-hours.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Update Sources & Push Changes
        run: |
          IPA_SIZE=$(stat -f%z rush-hours-unsigned.ipa)
          APK_SIZE=$(stat -f%z rush-hours.apk)
          VERSION="${{ steps.bump-version.outputs.version }}"
          TAG_NAME="v${VERSION}-b${{ github.run_number }}"
          BASE_URL="https://github.com/${{ github.repository }}/releases/download/${TAG_NAME}"
          IPA_URL="${BASE_URL}/rush-hours-unsigned.ipa"
          APK_URL="${BASE_URL}/rush-hours.apk"
          DATE=$(date +'%Y-%m-%d')
          
          node -e "
            const fs = require('fs');
            
            // Update sidestore-source.json (iOS)
            const iosSource = JSON.parse(fs.readFileSync('sidestore-source.json', 'utf8'));
            const iosApp = iosSource.apps[0];
            iosApp.version = '${VERSION}';
            iosApp.buildVersion = '${{ github.run_number }}';
            iosApp.versionDate = '${DATE}';
            iosApp.downloadURL = '${IPA_URL}';
            iosApp.size = parseInt('${IPA_SIZE}');
            fs.writeFileSync('sidestore-source.json', JSON.stringify(iosSource, null, 2));
            
            // Update android-source.json (Android)
            const androidSource = JSON.parse(fs.readFileSync('android-source.json', 'utf8'));
            const androidApp = androidSource.apps[0];
            androidApp.version = '${VERSION}';
            androidApp.buildVersion = '${{ github.run_number }}';
            androidApp.versionDate = '${DATE}';
            androidApp.downloadURL = '${APK_URL}';
            androidApp.size = parseInt('${APK_SIZE}');
            fs.writeFileSync('android-source.json', JSON.stringify(androidSource, null, 2));
          "
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json app.json sidestore-source.json android-source.json
          git commit -m "chore: bump version to ${VERSION} and update update sources [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
